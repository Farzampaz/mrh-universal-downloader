name: MRH Universal Downloader

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check commit message
        id: check
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "📝 Message: $MSG"
          
          if [[ "$MSG" =~ ^dl:\  ]]; then
            URLS=$(echo "$MSG" | sed 's/^dl: //')
            echo "urls=$URLS" >> $GITHUB_OUTPUT
            echo "mode=single" >> $GITHUB_OUTPUT
            echo "✅ Single download mode"
            
          elif [[ "$MSG" =~ ^dl-zip:\  ]]; then
            URLS=$(echo "$MSG" | sed 's/^dl-zip: //')
            echo "urls=$URLS" >> $GITHUB_OUTPUT
            echo "mode=zip" >> $GITHUB_OUTPUT
            echo "✅ ZIP mode"
            
          elif [[ "$MSG" =~ ^dl-gh:\  ]]; then
            URL=$(echo "$MSG" | sed 's/^dl-gh: //')
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "mode=github" >> $GITHUB_OUTPUT
            echo "✅ GitHub mode"
            
          elif [[ "$MSG" =~ ^dl-extract:\  ]]; then
            URL=$(echo "$MSG" | sed 's/^dl-extract: //')
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "mode=extract" >> $GITHUB_OUTPUT
            echo "✅ Extract mode"
            
          elif [[ "$MSG" == "dl-stop" ]]; then
            echo "mode=stop" >> $GITHUB_OUTPUT
            echo "🛑 Stop command"
          else
            echo "mode=none" >> $GITHUB_OUTPUT
            echo "ℹ️ No valid command"
          fi
          
      - name: Download files
        if: steps.check.outputs.mode == 'single'
        run: |
          mkdir -p downloads
          for URL in ${{ steps.check.outputs.urls }}; do
            FILENAME=$(basename "$URL" | cut -d '?' -f1)
            [ -z "$FILENAME" ] && FILENAME="file_$(date +%H%M%S)"
            echo "⬇️ Downloading: $FILENAME"
            curl -L -o "downloads/$FILENAME" "$URL"
          done
          
      - name: Download and ZIP
        if: steps.check.outputs.mode == 'zip'
        run: |
          mkdir -p downloads temp_dl
          cd temp_dl
          for URL in ${{ steps.check.outputs.urls }}; do
            FILENAME=$(basename "$URL" | cut -d '?' -f1)
            [ -z "$FILENAME" ] && FILENAME="file_$(date +%H%M%S)"
            echo "⬇️ Downloading: $FILENAME"
            curl -L -o "$FILENAME" "$URL"
          done
          ZIP_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"
          zip -r "../downloads/$ZIP_NAME" .
          cd ..
          rm -rf temp_dl
          echo "✅ Created: $ZIP_NAME"
          
      - name: Download from GitHub
        if: steps.check.outputs.mode == 'github'
        run: |
          mkdir -p downloads/github
          URL="${{ steps.check.outputs.url }}"
          FILENAME=$(basename "$URL" | cut -d '?' -f1)
          echo "⬇️ Downloading from GitHub: $FILENAME"
          curl -L -o "downloads/github/$FILENAME" "$URL"
          
      - name: Download and Extract
        if: steps.check.outputs.mode == 'extract'
        run: |
          mkdir -p downloads/extracted
          URL="${{ steps.check.outputs.url }}"
          FILENAME=$(basename "$URL" | cut -d '?' -f1)
          echo "⬇️ Downloading: $FILENAME"
          curl -L -o "$FILENAME" "$URL"
          unzip -o "$FILENAME" -d "downloads/extracted/"
          rm "$FILENAME"
          echo "✅ Extracted to: downloads/extracted/"
          
      - name: Show results
        run: |
          echo "=== 📁 DOWNLOADED FILES ==="
          find downloads -type f 2>/dev/null || echo "No files"
          
      - name: Commit
        run: |
          git config user.name "MRH Bot"
          git config user.email "mrh@local"
          git add downloads/ || true
          git diff --staged --quiet || git commit -m "MRH: Downloads [skip ci]"
          git push || true
