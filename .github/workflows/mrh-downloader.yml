name: MRH Universal Downloader v1.0.1

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: рџљЂ MRH Downloader - Initializing
      run: |
        echo "в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—"
        echo "в•‘  в–€в–€в–€в•—   в–€в–€в–€в•—в–€в–€в–€в–€в–€в–€в•— в–€в–€в•—  в–€в–€в•—                                  в•‘"
        echo "в•‘  в–€в–€в–€в–€в•— в–€в–€в–€в–€в•‘в–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в•‘  в–€в–€в•‘                                  в•‘"
        echo "в•‘  в–€в–€в•”в–€в–€в–€в–€в•”в–€в–€в•‘в–€в–€в–€в–€в–€в–€в•”в•ќв–€в–€в–€в–€в–€в–€в–€в•‘                                  в•‘"
        echo "в•‘  в–€в–€в•‘в•љв–€в–€в•”в•ќв–€в–€в•‘в–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в•”в•ђв•ђв–€в–€в•‘                                  в•‘"
        echo "в•‘  в–€в–€в•‘ в•љв•ђв•ќ в–€в–€в•‘в–€в–€в•‘  в–€в–€в•‘в–€в–€в•‘  в–€в–€в•‘                                  в•‘"
        echo "в•‘  в•љв•ђв•ќ     в•љв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ќ                                  в•‘"
        echo "в•‘                   MRH Universal Downloader v1.0.1             в•‘"
        echo "в•‘              For people in isolated internet                 в•‘"
        echo "в•‘                    coded by: MRH                             в•‘"
        echo "в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ"

    - name: рџ“Ґ Checkout repository
      uses: actions/checkout@v4

    - name: рџђЌ Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: рџ“¦ Install all dependencies
      run: |
        # System packages
        sudo apt-get update
        sudo apt-get install -y \
          wget \
          curl \
          aria2 \
          unzip \
          ffmpeg \
          p7zip-full \
          ca-certificates \
          git
        
        # Upgrade pip
        pip install --upgrade pip
        
        # Install yt-dlp (for YouTube, Instagram, and many other sites)
        pip install --upgrade yt-dlp
        
        # Install requests for better HTTP handling
        pip install requests beautifulsoup4
        
        # Verify installations
        echo "вњ… yt-dlp version:"
        yt-dlp --version || echo "вљ пёЏ yt-dlp not found"
        
        echo "вњ… ffmpeg version:"
        ffmpeg -version | head -1 || echo "вљ пёЏ ffmpeg not found"
        
        echo "вњ… aria2 version:"
        aria2c --version | head -1 || echo "вљ пёЏ aria2 not found"

    - name: рџ”§ Create necessary directories
      run: |
        mkdir -p downloads
        mkdir -p downloads/youtube
        mkdir -p downloads/instagram
        mkdir -p downloads/github
        mkdir -p downloads/chunked
        mkdir -p downloads/extracted
        echo "вњ… Directories created"

    - name: рџЋ¬ Run MRH Downloader
      id: downloader
      run: |
        python3 scripts/mrh_downloader.py 2>&1 | tee download_log.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PYTHONUNBUFFERED: 1

    - name: рџ“Љ List all downloaded files (debugging)
      if: always()
      run: |
        echo "=========================================="
        echo "рџ“Ѓ DOWNLOADED FILES REPORT"
        echo "=========================================="
        
        if [ -d "downloads" ]; then
          echo "Files in downloads directory:"
          find downloads -type f -exec ls -lh {} \; 2>/dev/null || echo "  (no files found)"
          echo ""
          echo "Directory structure:"
          find downloads -type d 2>/dev/null || echo "  (no directories)"
        else
          echo "вќЊ downloads directory does not exist!"
        fi
        
        echo ""
        echo "=========================================="
        echo "рџ“‹ LAST 20 LINES OF LOG:"
        echo "=========================================="
        tail -20 download_log.txt 2>/dev/null || echo "No log file found"
        echo "=========================================="

    - name: рџ’ѕ Commit and push downloaded files
      if: success()
      run: |
        git config user.name "MRH Downloader Bot"
        git config user.email "mrh-downloader@local"
        
        # Add any files in downloads directory
        if [ -d "downloads" ] && [ -n "$(ls -A downloads 2>/dev/null)" ]; then
          git add downloads/
          git diff --staged --quiet || git commit -m "MRH: Added downloaded files [skip ci]"
          git push || echo "вљ пёЏ Push failed but files are saved"
          echo "вњ… Files committed and pushed"
        else
          echo "в„№пёЏ No files to commit"
        fi

    - name: вљ пёЏ Debug on failure
      if: failure()
      run: |
        echo "=========================================="
        echo "вќЊ DOWNLOAD FAILED - DEBUG INFO"
        echo "=========================================="
        echo "Python version:"
        python3 --version
        echo ""
        echo "Installed pip packages:"
        pip list | grep -E "yt-dlp|requests|beautifulsoup4"
        echo ""
        echo "Last 50 lines of log:"
        tail -50 download_log.txt 2>/dev/null || echo "No log file"
        echo "=========================================="
