name: Simple Downloader

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install yt-dlp
      run: |
        pip install yt-dlp
        yt-dlp --version
    
    - name: Run Download
      run: python3 scripts/mrh_downloader.py
    
    - name: List files
      run: |
        echo "=== ALL FILES IN REPO ==="
        find . -type f -not -path "./.git/*" | sort
        echo "========================="
    
    - name: Commit
      run: |
        git config user.name "Bot"
        git config user.email "bot@local"
        git add downloads/ || true
        git add *.mp4 *.webm *.mp3 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Add downloads [skip ci]"
        git push || true
